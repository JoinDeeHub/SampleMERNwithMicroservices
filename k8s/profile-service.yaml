apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
      - name: profile-service
        image: gcr.io/heroviredacademics/profile-service
        ports:
        - containerPort: 3002
        env:
        - name: MONGO_URL
          value: mongodb://mongodb:27017/test
        - name: PORT
          value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
spec:
  type: NodePort   # 👈 IMPORTANT
  selector:
    app: profile-service
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002